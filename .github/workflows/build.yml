name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Ручной запуск

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean package
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ServerRestarterUltraPlus
        path: target/ServerRestarterUltraPlus-*.jar
    
    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0
        name: ServerRestarterUltraPlus v1.0.0-ULTRA
        body: |
          ## 🚀 ServerRestarterUltraPlus v1.0.0-ULTRA
          
          ### 🔥 Особенности:
          - Поддержка 5 языков (ru/en/de/fr/ch)
          - Сборка сообщения из частей
          - Работает на всех версиях Spigot 1.13+
          
          ### 👨‍💻 Автор:
          AllFiRE67 (c) 2026
          
          ### 📦 Установка:
          1. Скачать .jar файл
          2. Закинуть в папку plugins
          3. Перезапустить сервер
          4. Наслаждаться!
        files: target/ServerRestarterUltraPlus-*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
