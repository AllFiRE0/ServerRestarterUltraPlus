name: Build UltraPlus

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean package
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ServerRestarterUltraPlus
        path: target/ServerRestarterUltraPlus-*.jar
        retention-days: 30
    
    - name: Upload to Releases (если есть права)
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: 🚀 ServerRestarterUltraPlus v1.0.0-ULTRA
        body: "Самый лучший плагин для перезапуска!"
        files: target/ServerRestarterUltraPlus-*.jar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true  # ← НЕ ОСТАНАВЛИВАТЬ ПРИ ОШИБКЕ
